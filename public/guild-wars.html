<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Wars — Scenario Planner</title>
<style>
  :root {
    --color-background-primary: #020b18;
    --color-background-secondary: #061224;
    --color-background-tertiary: #0a1a35;
    --color-text-primary: #ffffff;
    --color-text-secondary: rgba(255,255,255,0.55);
    --color-text-tertiary: rgba(255,255,255,0.3);
    --color-border-tertiary: rgba(255,255,255,0.08);
    --color-border-secondary: rgba(255,255,255,0.12);
    --color-accent-orange: #e8601c;
    --color-accent-orange-light: #ff8c42;
    --color-accent-cyan: #23f0c7;
    --color-accent-blue: #00b4d8;
    --color-projected: #ff8c42;
    --color-new-entrant: #23f0c7;
    --color-background-info: rgba(35,240,199,0.06);
    --color-text-info: #23f0c7;
    --color-border-info: rgba(35,240,199,0.2);
    --color-bar-existing: #e8601c;
    --color-bar-projected: #ff8c42;
    --border-radius-md: 10px;
    --border-radius-lg: 14px;
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.08);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --color-background-primary: #f0f2f5;
      --color-background-secondary: #ffffff;
      --color-background-tertiary: #e8ecf1;
      --color-text-primary: #0a1a35;
      --color-text-secondary: rgba(10,26,53,0.6);
      --color-text-tertiary: rgba(10,26,53,0.35);
      --color-border-tertiary: rgba(10,26,53,0.1);
      --color-border-secondary: rgba(10,26,53,0.15);
      --color-background-info: rgba(35,240,199,0.08);
      --color-text-info: #0d8a6f;
      --color-border-info: rgba(13,138,111,0.25);
      --color-bar-existing: #e8601c;
      --color-bar-projected: #ff8c42;
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: rgba(10,26,53,0.1);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(160deg, var(--color-background-primary) 0%, var(--color-background-secondary) 30%, var(--color-background-tertiary) 100%);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 24px;
    line-height: 1.5;
  }

  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  .header-logo {
    width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle, #fff 20%, #ff8c42 50%, #e8601c 80%, transparent 100%);
    box-shadow: 0 0 20px rgba(232,96,28,0.5);
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header-sub { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 1.5px; text-transform: uppercase; margin-left: auto; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--border-radius-lg); padding: 16px; text-align: center;
    backdrop-filter: blur(12px);
  }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .metric-value { font-size: 28px; font-weight: 800; color: var(--color-text-primary); }
  .metric-value .metric-dim { font-size: 16px; font-weight: 400; color: var(--color-text-secondary); }

  /* Scenario buttons */
  .scenarios { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .scenario-btn {
    padding: 8px 18px; border-radius: 20px; border: 1px solid var(--color-border-secondary);
    background: transparent; color: var(--color-text-secondary); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.2s;
    font-family: inherit;
  }
  .scenario-btn:hover { border-color: var(--color-accent-orange-light); color: var(--color-text-primary); }
  .scenario-btn.active {
    background: var(--color-accent-orange); border-color: var(--color-accent-orange);
    color: #fff; font-weight: 600;
  }

  /* Table */
  .table-wrap {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--border-radius-lg); overflow-x: auto; margin-bottom: 20px;
    backdrop-filter: blur(12px);
  }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th {
    text-align: left; padding: 12px 14px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--color-text-tertiary); font-weight: 500;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  th:first-child { width: 36px; text-align: center; }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--color-border-tertiary); }
  tr:last-child td { border-bottom: none; }
  td:first-child { text-align: center; color: var(--color-text-tertiary); font-size: 12px; }
  .guild-name { font-weight: 600; white-space: nowrap; }
  .score-actual { color: var(--color-text-primary); }
  .score-projected { color: var(--color-projected); font-weight: 600; }
  .score-zero { color: var(--color-text-tertiary); }
  .score-null { color: var(--color-text-tertiary); }
  .total-col { font-weight: 700; font-size: 14px; }
  .bar-cell { width: 180px; }
  .bar-container {
    width: 100%; height: 18px; background: rgba(255,255,255,0.04);
    border-radius: 9px; overflow: hidden; display: flex; position: relative;
  }
  .bar-existing {
    height: 100%; background: var(--color-bar-existing); transition: width 0.4s ease;
    border-radius: 9px 0 0 9px;
  }
  .bar-projected {
    height: 100%; background: var(--color-bar-projected); opacity: 0.5;
    transition: width 0.4s ease;
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 3px,
      rgba(255,255,255,0.1) 3px, rgba(255,255,255,0.1) 6px
    );
  }

  /* New entrant row */
  tr.new-entrant { border-left: 3px solid var(--color-new-entrant); }
  tr.new-entrant .guild-name { color: var(--color-new-entrant); font-style: italic; }
  tr.new-entrant .bar-existing { background: var(--color-new-entrant); }
  tr.new-entrant .bar-projected { background: var(--color-new-entrant); opacity: 0.4; }

  /* Insight panel */
  .insight {
    background: var(--color-background-info); border: 1px solid var(--color-border-info);
    border-radius: var(--border-radius-lg); padding: 16px 20px; margin-bottom: 24px;
  }
  .insight-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-text-info); margin-bottom: 6px; font-weight: 600; }
  .insight-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.65; }
  .insight-body strong { color: var(--color-text-primary); font-weight: 600; }

  /* Custom panel */
  .custom-panel {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 20px;
    backdrop-filter: blur(12px); display: none;
  }
  .custom-panel.visible { display: block; }
  .custom-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .custom-header label { font-size: 12px; color: var(--color-text-secondary); }
  .custom-header input[type="number"] {
    width: 64px; padding: 6px 8px; border-radius: 6px;
    border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary);
    color: var(--color-text-primary); font-size: 13px; font-family: inherit;
  }
  .apply-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--color-accent-orange);
    background: transparent; color: var(--color-accent-orange); cursor: pointer;
    font-size: 12px; font-family: inherit; font-weight: 500; transition: all 0.2s;
  }
  .apply-btn:hover { background: var(--color-accent-orange); color: #fff; }
  .toggle-wrap {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .toggle-wrap label { font-size: 12px; color: var(--color-text-secondary); cursor: pointer; }
  .toggle {
    width: 36px; height: 20px; border-radius: 10px; border: none;
    background: var(--color-border-secondary); cursor: pointer; position: relative;
    transition: background 0.2s; appearance: none; -webkit-appearance: none;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .toggle:checked { background: var(--color-new-entrant); }
  .toggle:checked::after { transform: translateX(16px); }
  .custom-grid {
    display: grid; grid-template-columns: 1fr 80px; gap: 8px;
    max-height: 360px; overflow-y: auto; padding-right: 4px;
    align-items: center;
  }
  .custom-grid .cg-header {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--color-text-tertiary); padding-bottom: 4px;
    border-bottom: 1px solid var(--color-border-tertiary); font-weight: 500;
  }
  .custom-grid .cg-name { font-size: 13px; font-weight: 500; padding: 4px 0; }
  .custom-grid input[type="number"] {
    width: 100%; padding: 6px 8px; border-radius: 6px;
    border: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary);
    color: var(--color-text-primary); font-size: 13px; font-family: inherit; text-align: center;
  }
  .custom-grid input[type="number"]:focus {
    outline: none; border-color: var(--color-accent-orange);
  }
  .new-entrant-name { color: var(--color-new-entrant); font-style: italic; }

  /* Scrollbar */
  .custom-grid::-webkit-scrollbar { width: 4px; }
  .custom-grid::-webkit-scrollbar-track { background: transparent; }
  .custom-grid::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 640px) {
    body { padding: 16px; }
    .metrics { grid-template-columns: 1fr; }
    .metric-value { font-size: 22px; }
    .scenarios { gap: 6px; }
    .scenario-btn { padding: 6px 12px; font-size: 12px; }
    .custom-header { flex-direction: column; align-items: flex-start; }
    .toggle-wrap { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-logo"></div>
    <div class="header-title">Guild Wars — Scenario Planner</div>
    <div class="header-sub">Battle of Nodes</div>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="metric-label">Challenges Played</div>
      <div class="metric-value">4 <span class="metric-dim">/ 5</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Points Remaining</div>
      <div class="metric-value">110</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Max Possible Total</div>
      <div class="metric-value">550</div>
    </div>
  </div>

  <div class="scenarios" id="scenarioBar"></div>

  <div class="custom-panel" id="customPanel">
    <div class="custom-header">
      <label>Apply to all — Ch5:</label>
      <input type="number" id="bulkCh5" min="0" max="110" step="0.01" placeholder="—">
      <button class="apply-btn" id="applyAllBtn">Apply to all</button>
      <div class="toggle-wrap">
        <input type="checkbox" class="toggle" id="newEntrantToggle">
        <label for="newEntrantToggle">Add new entrant</label>
      </div>
    </div>
    <div class="custom-grid" id="customGrid"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Guild</th><th>Ch 1</th><th>Ch 2</th><th>Ch 3</th><th>Ch 4</th><th>Ch 5</th><th>Total</th><th class="bar-cell">Distribution</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="insight" id="insightPanel">
    <div class="insight-title">Insight</div>
    <div class="insight-body" id="insightBody"></div>
  </div>
</div>

<script>
// Ch1-Ch4 actual scores (4 challenges complete, 1 remaining)
const GUILDS = [
  { name: "RosettaStake", scores: [110, 110, 110, 110] },
  { name: "DinoVox", scores: [88.02, 36.09, 35.77, 54.40] },
  { name: "Last Resort", scores: [11.44, 75.28, 51.93, 23.75] },
  { name: "Disruptive Dots", scores: [15.98, 20.29, 77.20, 0] },
  { name: "Superrarebears", scores: [0, 84.89, 28.35, 25.00] },
  { name: "OpenHeart", scores: [55.13, 26.32, 25.49, 25.00] },
  { name: "TOMMY", scores: [30.43, 29.05, 13.97, 25.47] },
  { name: "KWAK", scores: [24.60, 28.90, 23.17, 17.50] },
  { name: "SparkGuild", scores: [0, 0, 0, 12.63] },
  { name: "GreenGlitch", scores: [21.12, 6.12, 19.57, 7.50] },
  { name: "HeroOrZero", scores: [17.56, 20.52, 0, 0] },
  { name: "SomeGuild", scores: [4.70, 18.94, 0, 0] },
  { name: "Emorya", scores: [4.92, 0, 0, 0] },
  { name: "XcronProtocol", scores: [0, 0, 3.66, 0] },
  { name: "LazyCompany", scores: [0, 1.91, 1.01, 0] },
  { name: "MrEGLD x ProjectX", scores: [2.50, 0, 0, 0] },
  { name: "Apex | Project X", scores: [1.67, 0, 0, 0] },
];

const MAX_TOTAL = 550;
const NUM_ACTUAL = 4; // Ch1-Ch4 are actual scores

function avg(scores) {
  const nonZero = scores.filter(s => s > 0);
  if (nonZero.length === 0) return 0;
  return nonZero.reduce((a, b) => a + b, 0) / nonZero.length;
}

function r(n) { return Math.round(n * 100) / 100; }

const SCENARIOS = [
  {
    id: "current", label: "Current Standings",
    compute() {
      return {
        guilds: GUILDS.map(g => ({ name: g.name, scores: [...g.scores, null], isNew: false })),
        insight: `<strong>RosettaStake</strong> leads with a perfect 440 — four consecutive 110s and 226 points clear of 2nd-place DinoVox (214.28). ` +
          `With only <strong>110 points</strong> left in Ch5, 1st place is mathematically locked. ` +
          `The real battle is 2nd through 5th: DinoVox (214), Last Resort (162), Superrarebears (138), OpenHeart (132), and Disruptive Dots (113) are all within one great round of each other. ` +
          `Notable: Disruptive Dots scored 0 in Ch4 after their Ch3 breakout, and SparkGuild entered the competition for the first time.`
      };
    }
  },
  {
    id: "new-entrant", label: "New Entrant",
    compute() {
      // New entrant wins Ch5 at 110. With them taking 1st tech, Rosetta gets ~88 (2nd tech + content + milestone).
      // Other guilds compressed slightly since a new dominant player takes the top tech spot.
      const overrides = {
        "RosettaStake": 88,
        "DinoVox": 58,
        "Last Resort": 55,
        "Superrarebears": 48,
        "OpenHeart": 42,
        "Disruptive Dots": 50,
        "TOMMY": 25,
        "KWAK": 26,
      };
      const guilds = GUILDS.map(g => {
        const ov = overrides[g.name];
        if (ov !== undefined) return { name: g.name, scores: [...g.scores, ov], isNew: false };
        const a = r(avg(g.scores));
        return { name: g.name, scores: [...g.scores, a], isNew: false };
      });
      guilds.push({ name: "New Entrant", scores: [0, 0, 0, 0, 110], isNew: true });
      return {
        guilds,
        insight: `A brand-new guild wins Ch5 at 110 — the maximum possible. ` +
          `Their total: <strong>110 points</strong>. That places them around 10th-11th overall, behind every guild that has competed in multiple rounds. ` +
          `RosettaStake finishes at 528 with a strong 2nd-place Ch5. DinoVox holds 2nd at ~272. ` +
          `The lesson: with only 1 challenge left, <strong>a new entrant has zero chance at the podium</strong>. The ship sailed after Ch3.`
      };
    }
  },
  {
    id: "average", label: "Average Pace",
    compute() {
      const guilds = GUILDS.map(g => {
        const a = r(avg(g.scores));
        return { name: g.name, scores: [...g.scores, a], isNew: false };
      });
      return {
        guilds,
        insight: `Each guild repeats their average performance (from rounds they competed in). ` +
          `<strong>RosettaStake</strong> projects to 550 — the theoretical max — since their average IS 110. ` +
          `DinoVox projects to ~268 (avg 53.57), Last Resort to ~203 (avg 40.60), Superrarebears to ~184 (avg 46.08). ` +
          `At average pace, the standings barely shift. The order is largely set — only an exceptional Ch5 performance changes anything.`
      };
    }
  },
  {
    id: "rosetta-stumbles", label: "Rosetta Stumbles",
    compute() {
      // Rosetta has a bad Ch5 (~40). With Rosetta not dominating tech, DinoVox wins at 108.
      // Other strong guilds benefit from the vacuum.
      const overrides = {
        "RosettaStake": 40,
        "DinoVox": 108,             // Wins Ch5 (strong 2nd in Ch4, upward momentum)
        "Last Resort": 72,          // Strong 2nd/3rd tech + full content
        "Superrarebears": 65,       // Competitive, full content
        "Disruptive Dots": 55,      // Bounce-back from Ch4 zero
        "OpenHeart": 45,            // Content-heavy, weaker tech
        "TOMMY": 30,
        "KWAK": 28,
        "SparkGuild": 20,
      };
      const guilds = GUILDS.map(g => {
        const ov = overrides[g.name];
        if (ov !== undefined) return { name: g.name, scores: [...g.scores, ov], isNew: false };
        const a = r(avg(g.scores));
        return { name: g.name, scores: [...g.scores, a], isNew: false };
      });
      return {
        guilds,
        insight: `RosettaStake has an uncharacteristically weak Ch5 at 40 (5th on tech, partial content, no milestone). ` +
          `<strong>DinoVox</strong> seizes the opportunity and wins Ch5 at 108 — a realistic winner score with full content and 1st milestone. ` +
          `Rosetta still finishes at <strong>480</strong> — untouchable for 1st. DinoVox surges to 322, Last Resort to 234, Superrarebears to 203. ` +
          `The takeaway: Rosetta's 440-point war chest means <strong>even a bad final round can't cost them the title</strong>. But DinoVox cements a strong 2nd.`
      };
    }
  },
  {
    id: "comeback", label: "Comeback Kids",
    compute() {
      // A lower-ranked guild has a breakout Ch5 and wins it.
      // Superrarebears (5th, 138.24) showed they can compete (84.89 in Ch2).
      // They win Ch5 at 108. Rosetta stays elite at 88. Front-runners compressed.
      const overrides = {
        "RosettaStake": 88,          // Still elite, 2nd tech
        "Superrarebears": 108,       // WINS Ch5! (5th → breakout, they were 2nd in Ch2 so it's proven)
        "DinoVox": 60,               // 3rd-4th tech range
        "Last Resort": 55,           // Competitive
        "Disruptive Dots": 65,       // Bounce-back round
        "OpenHeart": 45,             // Content-heavy
        "TOMMY": 28,
        "KWAK": 26,
        "SparkGuild": 18,
      };
      const guilds = GUILDS.map(g => {
        const ov = overrides[g.name];
        if (ov !== undefined) return { name: g.name, scores: [...g.scores, ov], isNew: false };
        const a = r(avg(g.scores));
        return { name: g.name, scores: [...g.scores, a], isNew: false };
      });
      return {
        guilds,
        insight: `<strong>Superrarebears</strong> (currently 5th at 138) has a breakout Ch5 at 108 — they proved they can do it with 84.89 in Ch2. ` +
          `This vaults them to <strong>246 total</strong>, leapfrogging Last Resort (217) and closing the gap on DinoVox (274). ` +
          `Rosetta stays dominant at 528 (2nd tech + content). ` +
          `The point: <strong>one dominant round from a mid-table guild can vault them two positions</strong> and completely reshape the podium race.`
      };
    }
  },
  {
    id: "custom", label: "Custom",
    compute() {
      const customData = readCustomInputs();
      const guilds = GUILDS.map(g => {
        const ch5 = customData[g.name] || 0;
        return { name: g.name, scores: [...g.scores, ch5], isNew: false };
      });
      if (customData.__newEntrant !== undefined) {
        guilds.push({ name: "New Entrant", scores: [0, 0, 0, 0, customData.__newEntrant], isNew: true });
      }
      const sorted = [...guilds].sort((a, b) => totalScore(b) - totalScore(a));
      const top = sorted[0];
      const second = sorted[1];
      const gap = r(totalScore(top) - totalScore(second));
      return {
        guilds,
        insight: `Custom scenario. <strong>${top.name}</strong> leads at ${r(totalScore(top))} points, ` +
          `${gap} ahead of <strong>${second.name}</strong> (${r(totalScore(second))}). ` +
          `Adjust Ch5 scores in the panel above to explore different outcomes.`
      };
    }
  }
];

let activeScenario = "current";
let newEntrantEnabled = false;

function totalScore(g) {
  return g.scores.reduce((sum, s) => sum + (s || 0), 0);
}

function existingTotal(g) {
  return g.scores.slice(0, NUM_ACTUAL).reduce((sum, s) => sum + (s || 0), 0);
}

function projectedTotal(g) {
  return g.scores[NUM_ACTUAL] || 0;
}

function readCustomInputs() {
  const result = {};
  GUILDS.forEach(g => {
    const inp = document.querySelector(`input[data-input="${g.name}-ch5"]`);
    result[g.name] = inp ? clamp(parseFloat(inp.value) || 0) : 0;
  });
  if (newEntrantEnabled) {
    const neInp = document.querySelector('input[data-input="__newEntrant-ch5"]');
    result.__newEntrant = neInp ? clamp(parseFloat(neInp.value) || 0) : 0;
  }
  return result;
}

function clamp(v) { return Math.min(110, Math.max(0, v)); }

function formatScore(val, isProjected) {
  if (val === null || val === undefined) return `<span class="score-null">—</span>`;
  if (val === 0) return `<span class="score-zero">0</span>`;
  const cls = isProjected ? 'score-projected' : 'score-actual';
  return `<span class="${cls}">${val.toFixed(2)}</span>`;
}

function renderTable(data) {
  const sorted = [...data.guilds].sort((a, b) => totalScore(b) - totalScore(a));
  const maxPossible = MAX_TOTAL;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = sorted.map((g, i) => {
    const total = totalScore(g);
    const existing = existingTotal(g);
    const projected = projectedTotal(g);
    const existPct = (existing / maxPossible) * 100;
    const projPct = (projected / maxPossible) * 100;
    const rowClass = g.isNew ? ' class="new-entrant"' : '';
    return `<tr${rowClass}>
      <td>${i + 1}</td>
      <td class="guild-name">${g.name}</td>
      <td>${formatScore(g.scores[0], false)}</td>
      <td>${formatScore(g.scores[1], false)}</td>
      <td>${formatScore(g.scores[2], false)}</td>
      <td>${formatScore(g.scores[3], false)}</td>
      <td>${formatScore(g.scores[4], g.scores[4] !== null)}</td>
      <td class="total-col">${total.toFixed(2)}</td>
      <td class="bar-cell">
        <div class="bar-container">
          <div class="bar-existing" style="width:${existPct}%"></div>
          <div class="bar-projected" style="width:${projPct}%"></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderInsight(data) {
  document.getElementById('insightBody').innerHTML = data.insight;
}

function buildScenarioBar() {
  const bar = document.getElementById('scenarioBar');
  bar.innerHTML = SCENARIOS.map(s =>
    `<button class="scenario-btn${s.id === activeScenario ? ' active' : ''}" data-scenario="${s.id}">${s.label}</button>`
  ).join('');
  bar.addEventListener('click', e => {
    const btn = e.target.closest('[data-scenario]');
    if (!btn) return;
    activeScenario = btn.dataset.scenario;
    bar.querySelectorAll('.scenario-btn').forEach(b => b.classList.toggle('active', b.dataset.scenario === activeScenario));
    document.getElementById('customPanel').classList.toggle('visible', activeScenario === 'custom');
    runScenario();
  });
}

function buildCustomPanel() {
  const grid = document.getElementById('customGrid');
  renderCustomGrid();

  document.getElementById('applyAllBtn').addEventListener('click', () => {
    const ch5Val = document.getElementById('bulkCh5').value;
    if (ch5Val !== '') {
      grid.querySelectorAll('input[data-ch="5"]').forEach(inp => {
        inp.value = clamp(parseFloat(ch5Val));
      });
    }
    runScenario();
  });

  document.getElementById('newEntrantToggle').addEventListener('change', e => {
    newEntrantEnabled = e.target.checked;
    renderCustomGrid();
    runScenario();
  });

  grid.addEventListener('input', debounce(() => runScenario(), 200));
}

function renderCustomGrid() {
  const grid = document.getElementById('customGrid');
  let html = `<div class="cg-header">Guild</div><div class="cg-header">Ch 5</div>`;
  GUILDS.forEach(g => {
    const a = avg(g.scores);
    html += `<div class="cg-name" data-guild="${g.name}">${g.name}</div>`;
    html += `<input type="number" min="0" max="110" step="0.01" data-input="${g.name}-ch5" data-ch="5" value="${r(a)}" placeholder="0">`;
  });
  if (newEntrantEnabled) {
    html += `<div class="cg-name new-entrant-name">New Entrant</div>`;
    html += `<input type="number" min="0" max="110" step="0.01" data-input="__newEntrant-ch5" data-ch="5" value="0" placeholder="0">`;
  }
  grid.innerHTML = html;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function runScenario() {
  const scenario = SCENARIOS.find(s => s.id === activeScenario);
  const data = scenario.compute();
  renderTable(data);
  renderInsight(data);
}

// Init
buildScenarioBar();
buildCustomPanel();
runScenario();
</script>
</body>
</html>
