<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080C14;
    --surface: #0D1420;
    --border: #1B2E45;
    --accent: #00D2C8;
    --accent-bright: #00FFE0;
    --text: #FFFFFF;
    --muted: #6B8BA4;
    --live: #00FF88;
    --glow-intensity: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Star field canvas */
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Vignette overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,12,20,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.025) 2px,
      rgba(255,255,255,0.025) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Brand anchor — full wordmark */
  .brand {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }

  .brand svg {
    height: 18px;
    width: auto;
    opacity: 0.30;
    filter: drop-shadow(0 0 12px rgba(35, 247, 221, 0.15));
    transition: opacity 0.8s ease, filter 0.8s ease;
  }

  .brand.active svg {
    opacity: 0.5;
    filter: drop-shadow(0 0 16px rgba(35, 247, 221, 0.3));
  }

  .brand-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.45;
    transition: opacity 0.8s ease;
  }

  .brand.active .brand-label {
    opacity: 0.7;
  }

  .container {
    width: 100%;
    max-width: 960px;
    padding: 0 32px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    z-index: 10;
    position: relative;
  }

  .panel {
    background: rgba(13, 20, 32, 0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px 48px 36px;
    backdrop-filter: blur(12px);
    transition: border-color 0.8s ease, box-shadow 0.8s ease;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 7px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(0,210,200,0.0) 0%, rgba(0,210,200,0.06) 50%, rgba(0,210,200,0.0) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .panel.pulse {
    border-color: rgba(0, 210, 200, 0.25);
    box-shadow: 0 0 30px rgba(0, 210, 200, 0.05), inset 0 0 30px rgba(0, 210, 200, 0.015);
  }

  .panel.pulse::before {
    opacity: 1;
  }

  /* Label with live indicator */
  .label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0, 255, 136, 0.06);
    border: 1px solid rgba(0, 255, 136, 0.12);
    border-radius: 3px;
    padding: 2px 7px 2px 5px;
  }

  .live-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--live);
    animation: livePulse 2s ease infinite;
    flex-shrink: 0;
  }

  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 6px 2px rgba(0, 255, 136, 0.25); transform: scale(1.3); }
  }

  .live-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--live);
    letter-spacing: 0.06em;
  }

  /* TPS number */
  .big-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: min(96px, 12vw);
    text-align: center;
    line-height: 1.1;
    transition: color 0.6s ease, text-shadow 0.8s ease;
    text-shadow: 0 0 calc(var(--glow-intensity) * 30px) rgba(0, 210, 200, calc(var(--glow-intensity) * 0.6)),
                 0 0 calc(var(--glow-intensity) * 60px) rgba(0, 210, 200, calc(var(--glow-intensity) * 0.3)),
                 0 0 calc(var(--glow-intensity) * 100px) rgba(0, 210, 200, calc(var(--glow-intensity) * 0.1));
    padding: 4px 0 8px;
  }

  .big-number.hot {
    color: var(--accent);
  }

  /* Gauge */
  .gauge { margin-top: 16px; }

  .gauge-track-wrap {
    position: relative;
  }

  .gauge-track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .gauge-glow {
    position: absolute;
    top: 50%;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: left 0.6s ease, opacity 0.4s ease, box-shadow 0.4s ease;
    left: 0%;
    opacity: 0;
    background: radial-gradient(circle, rgba(0,255,224,0.6) 0%, rgba(0,210,200,0.2) 40%, transparent 70%);
    box-shadow: 0 0 12px rgba(0,210,200,0.3);
  }

  .gauge-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    border-radius: 3px;
    width: 0%;
    transition: width 0.6s ease;
    box-shadow: 0 0 12px rgba(0, 210, 200, 0.4), 0 0 30px rgba(0, 210, 200, 0.12);
    position: relative;
    overflow: hidden;
  }

  .gauge-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s ease infinite;
  }

  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  .gauge-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.6;
  }

  /* Overflow state: TPS > 100K */
  .gauge-track-wrap.overflow .gauge-fill {
    background: linear-gradient(90deg, var(--accent), #00FFE0, #FFFFFF);
    box-shadow: 0 0 20px rgba(0, 255, 224, 0.6), 0 0 50px rgba(0, 210, 200, 0.3);
  }

  .gauge-track-wrap.overflow .gauge-track {
    box-shadow: 0 0 16px rgba(0, 255, 224, 0.25);
  }

  .overflow-label {
    position: absolute;
    right: 0;
    top: -22px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent-bright);
    text-shadow: 0 0 8px rgba(0, 255, 224, 0.5);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    white-space: nowrap;
  }

  .gauge-track-wrap.overflow .overflow-label {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes overflowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 224, 0.4), 0 0 50px rgba(0, 210, 200, 0.2); }
    50% { box-shadow: 0 0 30px rgba(0, 255, 224, 0.7), 0 0 70px rgba(0, 210, 200, 0.35); }
  }

  .gauge-track-wrap.overflow .gauge-fill {
    animation: overflowPulse 1.2s ease infinite;
  }

  /* Peak row — teal/cyan accent */
  .peak-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0, 210, 200, 0.04);
    border: 1px solid rgba(0, 210, 200, 0.12);
    border-radius: 3px;
    padding: 5px 16px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    transition: border-color 0.6s ease, background 0.6s ease;
  }

  .peak-row.flash {
    border-color: rgba(0, 210, 200, 0.35);
    background: rgba(0, 210, 200, 0.08);
  }

  .peak-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--accent);
    letter-spacing: 0.12em;
    opacity: 0.7;
  }

  .peak-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0, 210, 200, 0.3);
  }

  .peak-window {
    margin-top: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    opacity: 0.85;
    letter-spacing: 0.02em;
  }

  .peak-request-link {
    display: block;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-align: center;
    text-decoration: underline;
    text-underline-offset: 2px;
    opacity: 0.9;
    word-break: break-all;
  }

  .peak-proof {
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text);
    text-align: center;
    opacity: 0.8;
  }

  /* Panel 2: Transaction counter (odometer) */
  .tx-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: min(72px, 9vw);
    text-align: center;
    line-height: 1;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
    height: 1.15em;
    padding: 4px 0 8px;
  }

  .digit-slot {
    display: inline-block;
    width: 0.62em;
    height: 1.15em;
    overflow: hidden;
    position: relative;
    text-align: center;
  }

  .digit-slot.comma {
    width: 0.3em;
    overflow: visible;
    color: rgba(255, 255, 255, 0.35);
  }

  .digit-strip {
    display: flex;
    flex-direction: column;
    transition: transform 400ms cubic-bezier(0.23, 1, 0.32, 1);
    will-change: transform;
  }

  .digit-strip span {
    display: block;
    height: 1.15em;
    line-height: 1.15em;
  }

  /* Progress bar */
  .progress { margin-top: 20px; }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .progress-label-left {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  .progress-label-right {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0, 210, 200, 0.2);
  }

  .progress-track-container {
    position: relative;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    border-radius: 2px;
    width: 0%;
    transition: width 1s ease;
    box-shadow: 0 0 8px rgba(0, 210, 200, 0.3);
    position: relative;
  }

  /* Progress cursor dot at the leading edge */
  .progress-cursor {
    position: absolute;
    top: -3px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-bright);
    box-shadow: 0 0 10px rgba(0, 255, 224, 0.5), 0 0 20px rgba(0, 255, 224, 0.2);
    transform: translateX(-50%);
    transition: left 1s ease;
    z-index: 2;
  }

  .progress-ticks {
    position: relative;
    height: 16px;
    margin-top: 4px;
  }

  .progress-tick {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
  }

  .progress-tick::before {
    content: '';
    width: 1px;
    height: 5px;
    background: rgba(255, 255, 255, 0.08);
  }

  .progress-tick span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    opacity: 0.5;
    margin-top: 2px;
  }

  /* Connection status */
  .status-indicator {
    position: fixed;
    top: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    z-index: 50;
    transition: opacity 0.3s ease, color 0.3s ease;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-indicator.connected {
    color: var(--muted);
    opacity: 0.4;
  }

  .status-indicator.connected .status-dot {
    background: var(--live);
    animation: livePulse 3s ease infinite;
  }

  .status-indicator.disconnected {
    color: #FF4444;
    opacity: 1;
  }

  .status-indicator.disconnected .status-dot {
    background: #FF4444;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Epoch/block decoration */
  .meta-line {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.25;
    letter-spacing: 0.06em;
    z-index: 10;
    white-space: nowrap;
  }

  /* Milestone flash */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 90;
  }

  @keyframes milestone-flash {
    0% { opacity: 0.4; }
    100% { opacity: 0; }
  }

  /* Entry animation */
  .container {
    animation: fadeUp 0.8s ease both;
  }

  .brand {
    animation: fadeUp 0.8s 0.1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .container {
    animation: fadeUpContainer 0.8s ease both;
  }

  @keyframes fadeUpContainer {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .container { padding: 0 16px; gap: 24px; }
    .panel { padding: 24px 20px 28px; }
    .big-number { font-size: 56px; }
    .tx-number { font-size: 40px; }
    .brand svg { height: 14px; }
    .brand { top: 20px; gap: 6px; }
    .brand-label { font-size: 8px; }
    .gauge-ticks { font-size: 8px; }
    .peak-row { padding: 4px 12px; }
    .peak-value { font-size: 14px; }
    .peak-window { font-size: 9px; }
    .peak-request-link { font-size: 8px; }
    .peak-proof { font-size: 9px; }
    .peak-label { font-size: 9px; }
    .progress-ticks { display: none; }
    .meta-line { font-size: 7px; }
    .status-indicator { font-size: 8px; }
  }
</style>
</head>

<div class="status-indicator connected" id="status">
  <div class="status-dot"></div>
  <span id="statusText">CONNECTED</span>
</div>

<!-- Bottom meta line -->
<div class="meta-line" id="meta">BATTLENET_V2.0 :: EPOCH ---- :: BLK ----</div>

<div class="flash-overlay" id="flash"></div>

<div class="container">

  <!-- Panel 1: TPS -->
  <div class="panel" id="panel1">
    <div class="label">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
      </div>
      Transactions Per Second
    </div>
    <div class="big-number" id="tps">0</div>
    <div class="gauge">
      <div class="gauge-track-wrap" id="gaugeWrap">
        <span class="overflow-label" id="overflowLabel">BEYOND 100K</span>
        <div class="gauge-track">
          <div class="gauge-fill" id="tpsGauge"></div>
        </div>
        <div class="gauge-glow" id="tpsGlow"></div>
      </div>
      <div class="gauge-ticks">
        <span>0</span><span>25K</span><span>50K</span><span>75K</span><span>100K</span>
      </div>
    </div>
    <div class="peak-row" id="peakRow">
      <span class="peak-label">Session Peak</span>
      <span class="peak-value" id="peak">0</span>
    </div>
    <div class="peak-window" id="peakWindow">Peak window: --</div>
    <a class="peak-request-link" id="peakRequestLink" href="#" target="_blank" rel="noopener noreferrer">Peak request: --</a>
    <div class="peak-proof" id="peakProof">Peak proof: --</div>
  </div>

  <!-- Panel 2: Total Transactions -->
  <div class="panel" id="panel2">
    <div class="label">Total Transactions</div>
    <div class="tx-number" id="txCount"></div>
    <div class="progress">
      <div class="progress-labels">
        <span class="progress-label-left">To 1 Billion</span>
        <span class="progress-label-right" id="pct">0.00%</span>
      </div>
      <div class="progress-track-container">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-cursor" id="progressCursor" style="left:0%"></div>
        <div class="progress-ticks">
          <div class="progress-tick" style="left:25%"><span>250M</span></div>
          <div class="progress-tick" style="left:50%"><span>500M</span></div>
          <div class="progress-tick" style="left:75%"><span>750M</span></div>
          <div class="progress-tick" style="left:100%"><span>1B</span></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────
const API_STATS = 'https://api.battleofnodes.com/stats';
const API_TPS_COUNT = 'https://api.battleofnodes.com/transactions/c';
const API_TX_COUNT = 'https://api.battleofnodes.com/transactions/count?after=1773234000';
const POLL_MS = 600;
const TPS_OFFSET_MS = 15000;
const TPS_MAX = 100000;  // gauge scale — visual "expectations"
const TPS_CAP = 120000;  // hard cap — never display above this
const BILLION = 1_000_000_000;

const IDLE_THRESHOLD_MS = 10000; // show IDLE after 10s of 0 TPS

// ── State ───────────────────────────────────────────
let peakTps = 0;
let milestoneTriggered = false;
let currentTps = 0;
let lastNonZeroTime = performance.now();
let targetTps = 0;
let lastOdometerValue = '';
let timestampMsNow = Date.now();

// ── DOM refs ────────────────────────────────────────
const $tps = document.getElementById('tps');
const $tpsGauge = document.getElementById('tpsGauge');
const $tpsGlow = document.getElementById('tpsGlow');
const $gaugeWrap = document.getElementById('gaugeWrap');
const $overflowLabel = document.getElementById('overflowLabel');
const $peak = document.getElementById('peak');
const $peakRow = document.getElementById('peakRow');
const $peakWindow = document.getElementById('peakWindow');
const $peakRequestLink = document.getElementById('peakRequestLink');
const $peakProof = document.getElementById('peakProof');
const $txCount = document.getElementById('txCount');
const $pct = document.getElementById('pct');
const $progressFill = document.getElementById('progressFill');
const $progressCursor = document.getElementById('progressCursor');
const $status = document.getElementById('status');
const $statusText = document.getElementById('statusText');
const $flash = document.getElementById('flash');
const $panel1 = document.getElementById('panel1');
const $panel2 = document.getElementById('panel2');
const $brand = document.getElementById('brand');
const $meta = document.getElementById('meta');

// ── Star field ──────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
let starPulse = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  resizeCanvas();
  stars = [];
  const count = Math.min(120, Math.floor(canvas.width * canvas.height / 12000));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      baseAlpha: Math.random() * 0.25 + 0.08,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      scatterVx: 0,
      scatterVy: 0,
    });
  }
}

function triggerStarPulse() {
  starPulse = 1;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  for (const s of stars) {
    const dx = s.x - cx;
    const dy = s.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    s.scatterVx = (dx / dist) * 0.5;
    s.scatterVy = (dy / dist) * 0.5;
  }
}

let frameCount = 0;
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frameCount++;
  starPulse *= 0.965;

  for (const s of stars) {
    s.x += s.vx + s.scatterVx;
    s.y += s.vy + s.scatterVy;
    s.scatterVx *= 0.96;
    s.scatterVy *= 0.96;

    if (s.x < -2) s.x = canvas.width + 2;
    if (s.x > canvas.width + 2) s.x = -2;
    if (s.y < -2) s.y = canvas.height + 2;
    if (s.y > canvas.height + 2) s.y = -2;

    // Twinkle
    const twinkle = Math.sin(frameCount * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = (s.baseAlpha * twinkle) + starPulse * 0.35;

    // Color shift during pulse
    const r = Math.round(255 - starPulse * 255);
    const g = Math.round(255 - starPulse * 45);
    const b = Math.round(255 - starPulse * 55);
    const radius = s.r + starPulse * 0.4;

    ctx.beginPath();
    ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(alpha, 1)})`;
    ctx.fill();
  }

  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
initStars();
drawStars();

// ── TPS interpolation ───────────────────────────────
function animateTps() {
  const diff = targetTps - currentTps;
  currentTps += diff * 0.08;

  if (Math.abs(diff) < 0.5) currentTps = targetTps;

  const display = Math.round(currentTps);

  // Idle state: show '—' after 10s of zero
  if (display > 0) lastNonZeroTime = performance.now();
  const isIdle = display === 0 && (performance.now() - lastNonZeroTime > IDLE_THRESHOLD_MS);
  $tps.textContent = isIdle ? '—' : display.toLocaleString('en-US');
  $tps.style.opacity = isIdle ? '0.25' : '1';

  const glowIntensity = Math.min(display / 50000, 1);
  document.documentElement.style.setProperty('--glow-intensity', glowIntensity.toFixed(3));

  $tps.classList.toggle('hot', display >= 50000);

  const isOverflow = display > TPS_MAX;
  const pctFill = Math.min(display / TPS_MAX * 100, 100);
  $tpsGauge.style.width = pctFill + '%';
  $gaugeWrap.classList.toggle('overflow', isOverflow);
  if (isOverflow) {
    $overflowLabel.textContent = fmt(display) + ' TPS';
  }

  // Gauge glow: position at edge, intensity scales with TPS
  const glowScale = Math.min(display / 20000, 1); // ramps 0→1 over 0→20K TPS
  $tpsGlow.style.left = pctFill + '%';
  $tpsGlow.style.opacity = display > 0 ? (0.4 + glowScale * 0.6) : 0;
  const glowSize = 16 + glowScale * 24; // 16px to 40px
  $tpsGlow.style.width = glowSize + 'px';
  $tpsGlow.style.height = glowSize + 'px';
  $tpsGlow.style.boxShadow = `0 0 ${8 + glowScale * 20}px rgba(0,210,200,${0.2 + glowScale * 0.5}), 0 0 ${16 + glowScale * 40}px rgba(0,255,224,${glowScale * 0.25})`;

  requestAnimationFrame(animateTps);
}

animateTps();

// ── Odometer ────────────────────────────────────────
function buildOdometer(formatted) {
  $txCount.innerHTML = '';
  for (const ch of formatted) {
    if (ch === ',') {
      const slot = document.createElement('div');
      slot.className = 'digit-slot comma';
      slot.textContent = ',';
      $txCount.appendChild(slot);
    } else {
      const slot = document.createElement('div');
      slot.className = 'digit-slot';
      const strip = document.createElement('div');
      strip.className = 'digit-strip';
      for (let d = 0; d <= 9; d++) {
        const s = document.createElement('span');
        s.textContent = d;
        strip.appendChild(s);
      }
      strip.style.transform = `translateY(-${parseInt(ch) * 1.15}em)`;
      slot.appendChild(strip);
      $txCount.appendChild(slot);
    }
  }
  lastOdometerValue = formatted;
}

function updateOdometer(formatted) {
  if (formatted === lastOdometerValue) return;

  if (formatted.length !== lastOdometerValue.length) {
    buildOdometer(formatted);
    return;
  }

  const slots = $txCount.querySelectorAll('.digit-slot:not(.comma)');
  const digits = formatted.replace(/,/g, '');
  const oldDigits = lastOdometerValue.replace(/,/g, '');

  slots.forEach((slot, i) => {
    const newD = parseInt(digits[i]);
    const oldD = parseInt(oldDigits[i]);
    if (newD !== oldD) {
      const strip = slot.querySelector('.digit-strip');
      strip.style.transform = `translateY(-${newD * 1.15}em)`;
    }
  });

  lastOdometerValue = formatted;
}

// ── Panel pulse ─────────────────────────────────────
function pulsePanel(el) {
  el.classList.add('pulse');
  setTimeout(() => el.classList.remove('pulse'), 800);
}

// ── Brand pulse ─────────────────────────────────────
function pulseBrand() {
  $brand.classList.add('active');
  setTimeout(() => $brand.classList.remove('active'), 800);
}

// ── Peak flash ──────────────────────────────────────
function flashPeak() {
  $peakRow.classList.add('flash');
  setTimeout(() => $peakRow.classList.remove('flash'), 600);
}

// ── Milestone ───────────────────────────────────────
function triggerMilestone() {
  if (milestoneTriggered) return;
  milestoneTriggered = true;
  let count = 0;
  const interval = setInterval(() => {
    $flash.style.animation = 'none';
    $flash.offsetHeight;
    $flash.style.animation = 'milestone-flash 300ms ease forwards';
    count++;
    if (count >= 6) clearInterval(interval);
  }, 300);
}

// ── Format helper ───────────────────────────────────
function fmt(n) {
  return n.toLocaleString('en-US');
}

function fmtCompact(n) {
  if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
  if (n >= 1_000) return `${(n / 1_000).toFixed(1)}k`;
  return String(n);
}

function fmtWindowTime(ms) {
  return new Date(ms).toISOString().slice(11, 23) + 'Z';
}

// ── Polling ─────────────────────────────────────────
async function poll() {
  const windowNowMs = timestampMsNow;
  timestampMsNow += POLL_MS;
  const beforeMs = windowNowMs - TPS_OFFSET_MS;
  const afterMs = beforeMs - POLL_MS;

  try {
    const [statsRes, txCountRes, tpsRes] = await Promise.all([
      fetch(API_STATS),
      fetch(API_TX_COUNT),
      fetch(`${API_TPS_COUNT}?after=${afterMs}&before=${beforeMs}`),
    ]);
    if (!statsRes.ok || !txCountRes.ok || !tpsRes.ok) throw new Error('fetch failed');
    const stats = await statsRes.json();
    const txSinceLaunch = parseInt(await txCountRes.text(), 10);
    const txCountInWindow = parseInt(await tpsRes.text(), 10);

    // Connection OK
    $status.className = 'status-indicator connected';
    $statusText.textContent = 'CONNECTED';

    // Meta line
    $meta.textContent = `BATTLENET_V2.0 :: EPOCH ${stats.epoch} :: BLK ${fmt(stats.blocks)} :: SHARDS ${stats.shards}`;

    // TPS formula: tx count over a 600ms fixed window, offset by 5s from "now".
    if (Number.isFinite(txCountInWindow) && txCountInWindow >= 0) {
      const newTps = Math.min(
        Math.round(txCountInWindow / (POLL_MS / 1000)),
        TPS_CAP,
      );
      targetTps = newTps;
      if (newTps > peakTps) {
        peakTps = newTps;
        $peak.textContent = fmt(peakTps);
        $peakWindow.textContent = `Peak window: ${fmtWindowTime(afterMs)} -> ${fmtWindowTime(beforeMs)}`;
        const peakRequestUrl = `${API_TPS_COUNT}?after=${afterMs}&before=${beforeMs}`;
        $peakRequestLink.href = peakRequestUrl;
        $peakRequestLink.textContent = `Peak request: ${peakRequestUrl}`;
        $peakProof.textContent = `Peak proof: ${fmtCompact(txCountInWindow)} tx (${fmt(txCountInWindow)}) in ${POLL_MS}ms -> ${fmt(newTps)} TPS`;
        flashPeak();
      }
    }

    // Odometer
    const formatted = fmt(txSinceLaunch);
    if (!lastOdometerValue) {
      buildOdometer(formatted);
    } else {
      updateOdometer(formatted);
    }

    // Progress
    const pct = (txSinceLaunch / BILLION) * 100;
    const pctClamped = Math.min(pct, 100);
    $pct.textContent = pct.toFixed(2) + '%';
    $progressFill.style.width = pctClamped + '%';
    $progressCursor.style.left = pctClamped + '%';

    // Milestone
    if (txSinceLaunch >= BILLION) triggerMilestone();

    // Visual pulses
    pulsePanel($panel1);
    pulsePanel($panel2);
    pulseBrand();
    triggerStarPulse();

  } catch (e) {
    $status.className = 'status-indicator disconnected';
    $statusText.textContent = 'SIGNAL LOST';
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
